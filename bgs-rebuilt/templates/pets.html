<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pet Values – BGS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#030508;--surface:#050912;--card:#080d1a;--card2:#0c1220;
      --border:#0f1b2e;--border2:#162240;
      --pink:#3b82f6;--purple:#2563eb;--blue:#38bdf8;
      --yellow:#f59e0b;--green:#10b981;--red:#ef4444;
      --text:#e8e4f8;--muted:#2a3a5c;--muted2:#6b82a8;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}
    .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .blob{position:absolute;border-radius:50%;filter:blur(120px);}
    .blob-1{width:600px;height:600px;background:var(--purple);top:-200px;left:-200px;opacity:0.09;}
    .blob-2{width:400px;height:400px;background:var(--pink);bottom:-100px;right:-100px;opacity:0.07;}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;background:rgba(5,5,7,0.9);backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;height:56px;}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:auto;}
    .logo-mark{width:26px;height:26px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 14px rgba(37,99,235,0.35);}
    .nav-logo-text{font-weight:800;font-size:1.05rem;letter-spacing:-0.02em;background:linear-gradient(90deg,#e8f4ff,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .nav-links{display:flex;align-items:center;gap:2px;}
    .nav-links a{color:var(--muted2);font-weight:500;font-size:0.875rem;text-decoration:none;padding:7px 13px;border-radius:8px;transition:all 0.18s;}
    .nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.05);}
    .nav-links a.active{color:var(--purple);}
    .nav-discord{margin-left:10px;background:#5865F2!important;color:#fff!important;border-radius:8px!important;padding:6px 13px!important;font-weight:600!important;font-size:0.8rem!important;}
    .nav-lock{margin-left:6px;text-decoration:none;opacity:0.2;font-size:14px;padding:7px 8px;transition:opacity 0.2s;}
    .nav-lock:hover{opacity:0.6;}

    /* PAGE HEADER */
    .page-header{position:relative;z-index:1;padding:44px 24px 32px;text-align:center;}
    .page-header h1{font-size:2rem;font-weight:800;letter-spacing:-0.04em;}
    .page-header h1 span{background:linear-gradient(90deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .page-header p{color:var(--muted2);margin-top:8px;font-size:0.9rem;}

    /* CONTROLS */
    .controls{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:0 24px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
    .search-wrap{flex:1;min-width:200px;position:relative;}
    .search-wrap input{width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);font-family:'Outfit',sans-serif;font-size:0.875rem;padding:10px 16px 10px 40px;border-radius:10px;outline:none;transition:border-color 0.2s;}
    .search-wrap input:focus{border-color:var(--purple);}
    .search-wrap input::placeholder{color:var(--muted);}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:var(--muted);}
    .filter-row{display:flex;gap:6px;flex-wrap:wrap;}
    .filter-btn{background:var(--card);border:1px solid var(--border2);color:var(--muted2);font-family:'Outfit',sans-serif;font-weight:600;font-size:0.72rem;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all 0.18s;text-transform:uppercase;letter-spacing:0.06em;}
    .filter-btn:hover{border-color:var(--border2);color:var(--text);}
    .filter-btn.active{background:rgba(37,99,235,0.12);border-color:rgba(37,99,235,0.4);color:var(--purple);}
    .filter-btn.f-secret.active{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.35);color:#f87171;}
    .filter-btn.f-legendary.active{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.35);color:var(--yellow);}
    .filter-btn.f-limited.active{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.35);color:var(--pink);}
    .sort-select{background:var(--card);border:1px solid var(--border2);color:var(--text);font-family:'Outfit',sans-serif;font-weight:600;font-size:0.72rem;padding:8px 14px;border-radius:8px;cursor:pointer;outline:none;}
    .sort-select:focus{border-color:var(--purple);}
    .sort-select option{background:var(--card2);}

    /* RESULTS INFO */
    .results-info{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:0 24px 14px;color:var(--muted);font-size:0.8rem;font-weight:500;}

    /* GRID */
    .pets-grid{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}

    /* CARD */
    .pet-card{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;transition:all 0.22s;cursor:pointer;text-decoration:none;color:var(--text);display:block;animation:fadeUp 0.28s ease both;position:relative;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .pet-card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 10px 36px rgba(0,0,0,0.35);}
    .pet-card.r-secret-card:hover{border-color:rgba(239,68,68,0.3);box-shadow:0 10px 36px rgba(239,68,68,0.07);}
    .pet-card.r-legendary-card:hover{border-color:rgba(245,158,11,0.3);box-shadow:0 10px 36px rgba(245,158,11,0.07);}
    .pet-card.r-limited-card:hover{border-color:rgba(59,130,246,0.3);box-shadow:0 10px 36px rgba(59,130,246,0.07);}

    /* IMAGE */
    .pet-img-wrap{width:100%;height:128px;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    .pet-img-wrap img{width:100%;height:100%;object-fit:cover;}
    .pet-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
    .ph-limited{background:linear-gradient(135deg,rgba(59,130,246,0.07),rgba(37,99,235,0.07));}
    .ph-secret{background:linear-gradient(135deg,rgba(239,68,68,0.07),rgba(251,113,133,0.05));}
    .ph-legendary{background:linear-gradient(135deg,rgba(245,158,11,0.07),rgba(217,119,6,0.05));}
    .ph-rare{background:linear-gradient(135deg,rgba(56,189,248,0.06),rgba(14,165,233,0.05));}

    /* CARD BODY */
    .pet-card-body{padding:9px 11px 11px;}
    .pet-name{font-weight:700;font-size:0.86rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.01em;}
    .pet-meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}

    /* DEMAND */
    .demand-badge{display:inline-flex;align-items:center;gap:3px;font-size:0.65rem;font-weight:600;color:var(--muted2);}
    .demand-pip{width:3px;height:10px;border-radius:2px;background:var(--border2);}
    .demand-pip.on{background:linear-gradient(to top,var(--purple),var(--pink));}
    .trend-badge{font-size:0.65rem;font-weight:600;}
    .trend-up{color:var(--green);}
    .trend-down{color:var(--red);}
    .trend-stable{color:var(--muted);}

    /* RARITY TAG */
    .rarity-mini{display:inline-block;border-radius:4px;padding:1px 6px;font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
    .rm-secret{background:rgba(239,68,68,0.1);color:#f87171;}
    .rm-legendary{background:rgba(245,158,11,0.1);color:var(--yellow);}
    .rm-limited{background:rgba(59,130,246,0.1);color:var(--pink);}
    .rm-rare{background:rgba(56,189,248,0.08);color:var(--blue);}

    /* VALUE ROW */
    .value-row{display:flex;align-items:center;justify-content:space-between;gap:4px;}
    .value-normal{font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:700;color:var(--yellow);}
    .value-shiny{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:600;color:var(--blue);}
    .shiny-sep{color:var(--muted);font-size:0.7rem;margin:0 1px;}

    /* SHINY BADGE */
    .shiny-indicator{position:absolute;top:6px;right:6px;background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.3);border-radius:4px;padding:2px 6px;font-size:0.58rem;font-weight:700;color:var(--blue);letter-spacing:0.04em;}

    /* MODE TOGGLE */
    .mode-toggle{display:flex;background:var(--card);border:1px solid var(--border2);border-radius:10px;overflow:hidden;width:fit-content;}
    .mode-tab{padding:8px 18px;font-family:'Outfit',sans-serif;font-weight:700;font-size:0.78rem;border:none;cursor:pointer;transition:all 0.18s;background:transparent;color:var(--muted2);letter-spacing:-0.01em;white-space:nowrap;}
    .mode-tab.active{color:#fff;}
    .mode-tab.tab-normal.active{background:linear-gradient(135deg,var(--blue),var(--purple));}
    .mode-tab.tab-shiny.active{background:linear-gradient(135deg,#38bdf8,#818cf8);}
    .mode-tab.tab-prismatic.active{background:linear-gradient(135deg,#a855f7,#ec4899,#f59e0b);}
    .mode-tab.tab-rainbow.active{background:linear-gradient(90deg,#ef4444,#f97316,#f59e0b,#22c55e,#3b82f6,#a855f7);}
    /* Prismatic card glow */
    .pet-card.prismatic-mode:hover{border-color:rgba(168,85,247,0.5);box-shadow:0 10px 36px rgba(168,85,247,0.15);}
    .prismatic-indicator{position:absolute;top:6px;right:6px;background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(236,72,153,0.2));border:1px solid rgba(168,85,247,0.4);border-radius:4px;padding:2px 6px;font-size:0.58rem;font-weight:700;color:#d8b4fe;letter-spacing:0.04em;}
    /* Rainbow card glow */
    .pet-card.rainbow-mode:hover{border-color:rgba(251,191,36,0.5);box-shadow:0 10px 36px rgba(251,191,36,0.12);}
    .rainbow-indicator{position:absolute;top:6px;right:6px;background:linear-gradient(90deg,rgba(239,68,68,0.15),rgba(59,130,246,0.15));border:1px solid rgba(251,191,36,0.4);border-radius:4px;padding:2px 6px;font-size:0.58rem;font-weight:700;letter-spacing:0.04em;background-clip:text;-webkit-background-clip:text;color:#fcd34d;}
    .no-tier-state{grid-column:1/-1;text-align:center;padding:48px 0;color:var(--muted2);}
    .no-tier-state .ns-icon{font-size:2rem;margin-bottom:10px;opacity:0.4;}
    .no-tier-state p{font-size:0.85rem;}

    /* EMPTY STATE */
    .empty-state{grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted2);}
    .empty-state .e-icon{font-size:2.5rem;margin-bottom:12px;opacity:0.5;}
    .empty-state h3{font-size:1rem;font-weight:700;margin-bottom:4px;}
    .empty-state p{font-size:0.85rem;font-weight:400;}

    /* LOADING */
    .loading-dots{display:flex;gap:5px;justify-content:center;padding:60px 0;}
    .loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:ldot 1.2s infinite;}
    .loading-dots span:nth-child(2){animation-delay:0.2s;}
    .loading-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes ldot{0%,100%{opacity:0.2;transform:scale(0.8);}50%{opacity:1;transform:scale(1);}}

    footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:22px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .footer-brand{font-weight:700;font-size:0.85rem;background:linear-gradient(90deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .footer-text{color:var(--muted);font-size:0.75rem;}
  </style>
</head>
<body>
<div class="ambient"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<nav>
  <a href="/" class="nav-logo">
    <div class="logo-mark">🫧</div>
    <span class="nav-logo-text">BGS</span>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/pets" class="active">Value List</a>
    <a href="https://discord.gg/ogbgs" class="nav-discord" target="_blank">Discord</a>
    <a href="/admin/login" class="nav-lock" title="Admin">🔒</a>
  </div>
</nav>

<div class="page-header">
  <h1><span>Pet Value List</span></h1>
  <p id="lastUpdated">Loading values...</p>
</div>

<div style="position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:0 24px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
  <div class="mode-toggle">
    <button class="mode-tab tab-normal active" id="tab-normal" onclick="setMode('normal')">Normal</button>
    <button class="mode-tab tab-shiny" id="tab-shiny" onclick="setMode('shiny')">✨ Shiny</button>
    <button class="mode-tab tab-rainbow" id="tab-rainbow" onclick="setMode('rainbow')">🌈 Rainbow</button>
    <button class="mode-tab tab-prismatic" id="tab-prismatic" onclick="setMode('prismatic')">💎 Prismatic</button>
  </div>
  <span id="modeLabel" style="font-size:0.75rem;color:var(--muted2);font-weight:500;"></span>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search pets…" oninput="applyFilters()">
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn f-secret" onclick="setFilter('Limited Secret',this)">Ltd Secret</button>
    <button class="filter-btn f-secret" onclick="setFilter('Permanent Secret',this)">Perm Secret</button>
    <button class="filter-btn f-legendary" onclick="setFilter('Limited Legendary',this)">Legendary</button>
    <button class="filter-btn" onclick="setFilter('Robux',this)">Robux</button>
    <button class="filter-btn" onclick="setFilter('Misc',this)">Misc</button>
  </div>
  <select class="sort-select" id="sortSelect" onchange="applyFilters()">
    <option value="value_desc">Value ↓</option>
    <option value="value_asc">Value ↑</option>
    <option value="name_asc">Name A–Z</option>
    <option value="name_desc">Name Z–A</option>
  </select>
</div>
<div class="results-info" id="resultsInfo"></div>
<div class="pets-grid" id="petsGrid">
  <div class="loading-dots" style="grid-column:1/-1"><span></span><span></span><span></span></div>
</div>

<footer>
  <span class="footer-brand">BGS</span>
  <span class="footer-text">Community-maintained pet value list</span>
</footer>

<script>
  const API='';
  let allPets=[];
  let activeFilter='all';
  let activeMode='normal'; // 'normal' | 'shiny' | 'prismatic' | 'rainbow'

  const MODES=['normal','shiny','prismatic','rainbow'];
  const MODE_FIELD={normal:'value',shiny:'shiny_value',prismatic:'prismatic_value',rainbow:'rainbow_value'};
  const MODE_IMG={normal:'image_url',shiny:'shiny_image_url',prismatic:'prismatic_image_url',rainbow:'rainbow_image_url'};
  const MODE_COLOR={normal:'var(--yellow)',shiny:'var(--blue)',prismatic:'#d8b4fe',rainbow:'#fcd34d'};
  const MODE_LABEL={normal:'',shiny:'✨ Shiny',prismatic:'💎 Prismatic',rainbow:'🌈 Rainbow'};

  function fv(v){if(!v||v==='null'||v==='0')return'N/A';const u=v.toString().toUpperCase().trim();if(u==='N/A'||u==='O/C')return u;const n=parseFloat(v);if(isNaN(n))return v;if(n>=1e6)return(n/1e6).toFixed(1).replace(/\.0$/,'')+'M';if(n>=1000)return(n/1000).toFixed(1).replace(/\.0$/,'')+'K';return n.toString();}
  function hasTier(p,mode){const v=p[MODE_FIELD[mode]];return v&&v!=='null'&&v!=='0';}

  function rarityCard(r){if(!r)return'';const l=r.toLowerCase();if(l.includes('secret'))return'r-secret-card';if(l.includes('legendary'))return'r-legendary-card';if(l.includes('limited'))return'r-limited-card';return'';}
  function phClass(r){if(!r)return'ph-rare';const l=r.toLowerCase();if(l.includes('secret'))return'ph-secret';if(l.includes('legendary'))return'ph-legendary';if(l.includes('limited'))return'ph-limited';return'ph-rare';}
  function rmClass(r){if(!r)return'rm-rare';const l=r.toLowerCase();if(l.includes('secret'))return'rm-secret';if(l.includes('legendary'))return'rm-legendary';if(l.includes('limited'))return'rm-limited';return'rm-rare';}

  function demandPips(d){let h='';for(let i=0;i<5;i++)h+=`<span class="demand-pip${i<Math.ceil((d||0)/2)?' on':''}"></span>`;return h;}
  function trendHtml(t){if(t==='up')return'<span class="trend-badge trend-up">▲</span>';if(t==='down')return'<span class="trend-badge trend-down">▼</span>';return'<span class="trend-badge trend-stable">—</span>';}

  function tierBadge(mode){
    if(mode==='shiny')return'<span class="shiny-indicator">✨ Shiny</span>';
    if(mode==='prismatic')return'<span class="prismatic-indicator">💎 Prismatic</span>';
    if(mode==='rainbow')return'<span class="rainbow-indicator">🌈 Rainbow</span>';
    return'';
  }

  function renderCard(p,i){
    const imgField=MODE_IMG[activeMode];
    const imgSrc=p[imgField]||p.image_url;
    const img=imgSrc
      ?`<img src="${imgSrc}" alt="${p.name}" loading="lazy">`
      :`<div class="pet-img-placeholder ${phClass(p.rarity)}">${p.name.split(' ').map(w=>w[0]).join('')}</div>`;
    const displayVal=fv(p[MODE_FIELD[activeMode]]);
    const valColor=MODE_COLOR[activeMode];
    const modeClass=activeMode!=='normal'?` ${activeMode}-mode`:'';
    return`<a href="/pet/${p.id}" class="pet-card ${rarityCard(p.rarity)}${modeClass}" style="animation-delay:${Math.min(i*0.03,0.5)}s">
      <div class="pet-img-wrap">${img}${activeMode!=='normal'?tierBadge(activeMode):''}</div>
      <div class="pet-card-body">
        <div class="pet-name">${p.name}</div>
        <span class="rarity-mini ${rmClass(p.rarity)}">${p.rarity||'Unknown'}</span>
        <div class="pet-meta-row">
          <div class="demand-badge">${demandPips(p.demand)}</div>
          ${trendHtml(p.trend)}
        </div>
        <div class="value-row">
          <span class="value-normal" style="color:${valColor}">${displayVal}</span>
        </div>
      </div>
    </a>`;
  }

  function setMode(mode){
    activeMode=mode;
    MODES.forEach(m=>{
      const el=document.getElementById('tab-'+m);
      if(el)el.classList.toggle('active',m===mode);
    });
    const label=document.getElementById('modeLabel');
    if(mode!=='normal'){
      const count=allPets.filter(p=>hasTier(p,mode)).length;
      label.textContent=`${count} pets have ${mode} variants`;
      label.style.color=MODE_COLOR[mode];
    }else{
      label.textContent='';
    }
    applyFilters();
  }

  function setFilter(f,btn){
    activeFilter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function applyFilters(){
    const q=document.getElementById('searchInput').value.toLowerCase().trim();
    const sort=document.getElementById('sortSelect').value;
    let pets=allPets.filter(p=>{
      const matchRarity=activeFilter==='all'||p.rarity===activeFilter;
      const matchSearch=!q||p.name.toLowerCase().includes(q)||(p.rarity||'').toLowerCase().includes(q);
      const matchMode=activeMode==='normal'||hasTier(p,activeMode);
      return matchRarity&&matchSearch&&matchMode;
    });
    const sv=(p)=>p[MODE_FIELD[activeMode]]||p.value;
    const sortFns={
      value_desc:(a,b)=>(parseFloat(sv(b))||0)-(parseFloat(sv(a))||0),
      value_asc:(a,b)=>(parseFloat(sv(a))||0)-(parseFloat(sv(b))||0),
      name_asc:(a,b)=>a.name.localeCompare(b.name),
      name_desc:(a,b)=>b.name.localeCompare(a.name),
    };
    pets.sort(sortFns[sort]||sortFns.value_desc);
    document.getElementById('resultsInfo').textContent=`${pets.length} pet${pets.length!==1?'s':''} found`;
    const grid=document.getElementById('petsGrid');
    if(pets.length===0){
      const icon=activeMode==='prismatic'?'💎':activeMode==='rainbow'?'🌈':'✨';
      const msg=activeMode==='normal'?'No pets found. Try adjusting your search or filter.':`No ${activeMode} values set yet for this filter.`;
      grid.innerHTML=`<div class="no-tier-state"><div class="ns-icon">${activeMode==='normal'?'🔍':icon}</div><p>${msg}</p></div>`;
      return;
    }
    grid.innerHTML=pets.map((p,i)=>renderCard(p,i)).join('');
  }

  async function load(){
    try{
      const r=await fetch(`${API}/api/pets/`);
      allPets=await r.json();
      // check for url param
      const urlParams=new URLSearchParams(window.location.search);
      const rarityParam=urlParams.get('rarity');
      if(rarityParam){
        activeFilter=rarityParam;
        document.querySelectorAll('.filter-btn').forEach(btn=>{
          if(btn.textContent.trim()===rarityParam||btn.getAttribute('onclick')&&btn.getAttribute('onclick').includes(rarityParam)){
            btn.classList.add('active');
          }
        });
        // also deactivate "all"
        const allBtn=document.querySelector('.filter-btn:first-child');
        if(allBtn)allBtn.classList.remove('active');
      }
      document.getElementById('lastUpdated').textContent=`${allPets.length} pets tracked · Updated regularly`;
      applyFilters();
    }catch(e){
      document.getElementById('petsGrid').innerHTML='<div class="empty-state"><div class="e-icon">⚠️</div><h3>Failed to load pets</h3><p>Please try again later.</p></div>';
    }
  }
  load();
</script>
</body>
</html>
