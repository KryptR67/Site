<script>
let allPets=[];
let activeFilter='all';
let activeMode='normal';

const MODE_FIELD = {
  normal: 'value',
  shiny: 'shiny_value'
};

const MODE_IMG = {
  normal: 'image_url',
  shiny: 'shiny_image_url'
};

function fv(v){
  if(!v)return'N/A';
  const n=parseFloat(v);
  if(isNaN(n))return v;
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1000)return(n/1000).toFixed(1)+'K';
  return n;
}

function setMode(mode){
  activeMode = mode;

  document.querySelectorAll('.mode-tab').forEach(btn=>{
    btn.classList.remove('active');
  });

  document.querySelector(mode==='shiny'
    ? '.tab-shiny'
    : '.tab-normal'
  ).classList.add('active');

  applyFilters();
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function render(p){
  const img=p[MODE_IMG[activeMode]]||p.image_url;

  return `
  <a href="/pet/${p.id}" class="pet-card">
    <div class="pet-img-wrap">
      ${img ? `<img src="${img}">` : 'No Image'}
    </div>
    <div class="pet-card-body">
      <div class="pet-name">${p.name}</div>
      <div class="value-row">
        <span class="value-normal">
          ${fv(p[MODE_FIELD[activeMode]])}
        </span>
      </div>
    </div>
  </a>`;
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const sort=document.getElementById('sortSelect').value;

  let pets=allPets.filter(p=>{
    return (activeFilter==='all'||p.rarity===activeFilter)
      && (!q||p.name.toLowerCase().includes(q));
  });

  const getVal = (p)=> parseFloat(p[MODE_FIELD[activeMode]]) || 0;

  const sorts={
    value_desc:(a,b)=>getVal(b)-getVal(a),
    value_asc:(a,b)=>getVal(a)-getVal(b),
    name_asc:(a,b)=>a.name.localeCompare(b.name),
    name_desc:(a,b)=>b.name.localeCompare(a.name)
  };

  pets.sort(sorts[sort]||sorts.value_desc);

  document.getElementById('petsGrid').innerHTML=pets.map(render).join('');
}

async function load(){
  const r=await fetch('/api/pets/');
  allPets=await r.json();

  document.getElementById('lastUpdated').textContent=
    `${allPets.length} pets loaded`;

  applyFilters();
}

load();
</script>
