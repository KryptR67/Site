<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pet Values – BGS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#030508;
  --card:#0b1020;
  --border:#15213a;
  --text:#e8e4f8;
  --muted:#2a3a5c;
  --muted2:#6b82a8;
  --yellow:#f59e0b;
  --blue:#38bdf8;
  --green:#22c55e;
  --red:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
}

nav{
  position:sticky;
  top:0;
  background:#060912;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:12px 24px;
}

.nav-logo{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  margin-right:auto;
  color:white;
  font-weight:800;
}

.logo{
  width:24px;height:24px;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  border-radius:6px;
}

.nav-links a{
  color:var(--muted2);
  text-decoration:none;
  margin-left:12px;
  font-size:0.85rem;
}

.nav-links a.active{color:var(--blue);}

.header{
  text-align:center;
  padding:40px 20px 10px;
}

.header h1{
  font-size:2rem;
  font-weight:800;
}

.header span{
  color:var(--blue);
}

.controls{
  max-width:1100px;
  margin:auto;
  padding:10px 20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.search{
  flex:1;
  min-width:200px;
}

.search input{
  width:100%;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

.btn{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--muted2);
  cursor:pointer;
}

.btn.active{color:var(--blue);}

.mode{
  display:flex;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}

.mode button{
  padding:8px 14px;
  border:none;
  background:transparent;
  color:var(--muted2);
  cursor:pointer;
  font-weight:700;
}

.mode button.active{
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:white;
}

.grid{
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  text-decoration:none;
  color:var(--text);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.img{
  height:130px;
  background:#0a0f1f;
  display:flex;
  align-items:center;
  justify-content:center;
}

.img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.body{
  padding:10px;
}

/* TOP ROW */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name{
  font-weight:800;
  font-size:0.9rem;
}

.trend{
  font-size:0.6rem;
  padding:3px 6px;
  border-radius:6px;
  background:rgba(255,255,255,0.05);
}

.trend.up{color:var(--green);}
.trend.down{color:var(--red);}
.trend.stable{color:#94a3b8;}

/* RARITY */
.rarity{
  margin-top:6px;
  font-size:0.6rem;
  text-transform:uppercase;
  font-weight:800;
  color:#60a5fa;
}

/* VALUE */
.value-label{
  font-size:0.65rem;
  color:var(--muted2);
  margin-top:8px;
}

.value{
  font-size:1.1rem;
  font-weight:900;
  color:var(--yellow);
  font-family:'JetBrains Mono';
}

/* FOOTER */
.footer{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-size:0.65rem;
  color:var(--muted2);
}
</style>
</head>

<body>

<nav>
  <a class="nav-logo" href="/">
    <div class="logo"></div>
    BGS
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a class="active" href="/pets">Values</a>
  </div>
</nav>

<div class="header">
  <h1><span>Pet Value List</span></h1>
  <p id="lastUpdated">Loading...</p>
</div>

<div class="controls">

  <div class="mode">
    <button class="active" onclick="setMode('normal')">Normal</button>
    <button onclick="setMode('shiny')">Shiny</button>
  </div>

  <div class="search">
    <input id="search" placeholder="Search..." oninput="render()">
  </div>

  <button class="btn active" onclick="setFilter('all',this)">All</button>
  <button class="btn" onclick="setFilter('Limited Secret',this)">Ltd Secret</button>
  <button class="btn" onclick="setFilter('Permanent Secret',this)">Perm Secret</button>
</div>

<div class="grid" id="grid"></div>

<script>
let pets=[];
let mode='normal';
let filter='all';

const FIELD={
  normal:'value',
  shiny:'shiny_value'
};

function fv(v){
  if(!v)return"N/A";
  const n=parseFloat(v);
  if(isNaN(n))return v;
  if(n>=1e6)return(n/1e6).toFixed(1)+"M";
  if(n>=1000)return(n/1000).toFixed(1)+"K";
  return n;
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function card(p){
  return `
  <a href="/pet/${p.id}" class="card">
    <div class="img">
      ${p.image_url?`<img src="${p.image_url}">`:'No Image'}
    </div>
    <div class="body">
      
      <div class="top">
        <div class="name">${p.name}</div>
        <div class="trend ${p.trend||'stable'}">
          ${p.trend==='up'?'▲ Rising':p.trend==='down'?'▼ Drop':'—'}
        </div>
      </div>

      <div class="rarity">${p.rarity||'Unknown'}</div>

      <div class="value-label">Value</div>
      <div class="value">${fv(p[FIELD[mode]])}</div>

      <div class="footer">
        <div>${p.exists_normal||0} exist</div>
        <div>${p.updated||''}</div>
      </div>

    </div>
  </a>`;
}

function render(){
  let q=document.getElementById('search').value.toLowerCase();

  let list=pets.filter(p=>{
    return (filter==='all'||p.rarity===filter)
      && (!q||p.name.toLowerCase().includes(q));
  });

  document.getElementById('grid').innerHTML=list.map(card).join('');
}

async function load(){
  let r=await fetch('/api/pets/');
  pets=await r.json();
  document.getElementById('lastUpdated').textContent=pets.length+" pets loaded";
  render();
}
load();
</script>

</body>
</html>
