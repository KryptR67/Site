<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – BGS</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#030508;--card:#080d1a;--border:#0f1b2e;--border2:#162240;--pink:#3b82f6;--purple:#2563eb;--text:#e8e4f8;--muted:#2a3a5c;--muted2:#6b82a8;--red:#ef4444;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .blob{position:absolute;border-radius:50%;filter:blur(120px);}
    .blob-1{width:500px;height:500px;background:var(--purple);top:-150px;left:-150px;opacity:0.1;}
    .blob-2{width:400px;height:400px;background:var(--pink);bottom:-100px;right:-100px;opacity:0.08;}
    .login-box{position:relative;z-index:1;background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:36px;width:100%;max-width:380px;margin:24px;}
    .login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;}
    .logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 16px rgba(37,99,235,0.4);}
    .logo-text{font-weight:800;font-size:1.2rem;letter-spacing:-0.03em;background:linear-gradient(90deg,#e8f4ff,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    h2{text-align:center;font-size:1.3rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:6px;}
    .sub{text-align:center;color:var(--muted2);font-size:0.85rem;margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    label{display:block;font-size:0.72rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px;}
    input{width:100%;background:#050912;border:1px solid var(--border2);color:var(--text);font-family:'Outfit',sans-serif;font-size:0.9rem;padding:11px 14px;border-radius:10px;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--purple);}
    .error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:var(--red);border-radius:9px;padding:10px 14px;font-size:0.83rem;font-weight:500;margin-bottom:18px;text-align:center;}
    .btn{width:100%;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Outfit',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.2s;margin-top:8px;box-shadow:0 4px 20px rgba(37,99,235,0.25);}
    .btn:hover{opacity:0.88;transform:translateY(-1px);}
    .back-link{display:block;text-align:center;margin-top:16px;color:var(--muted2);font-size:0.82rem;text-decoration:none;}
    .back-link:hover{color:var(--purple);}
  </style>
</head>
<body>
<div class="ambient"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<div class="login-box">
  <div class="login-logo">
    <div class="logo-mark">🫧</div>
    <span class="logo-text">BGS</span>
  </div>
  <h2>Admin Login</h2>
  <div class="sub">Sign in to manage pet values</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Sign In →</button>
  </form>
  <a href="/" class="back-link">← Back to site</a>
</div>
</body>
</html>
